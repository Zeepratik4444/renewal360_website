# ============================================================
# Renewal360 — Nginx Configuration
# File: services/nginx/renewal360.in.conf
#
# To deploy on server:
#   sudo cp /home/ubuntu/home/renewal360_website/services/nginx/renewal360.in.conf \
#            /etc/nginx/sites-available/renewal360.in
#   sudo ln -sf /etc/nginx/sites-available/renewal360.in \
#               /etc/nginx/sites-enabled/renewal360.in
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── Redirect all HTTP → HTTPS (non-www) ──────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name renewal360.in www.renewal360.in;
    return 301 https://renewal360.in$request_uri;
}

# ── Redirect HTTPS www → non-www ─────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.renewal360.in;

    ssl_certificate     /etc/letsencrypt/live/renewal360.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renewal360.in/privkey.pem;

    return 301 https://renewal360.in$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name renewal360.in;

    ssl_certificate     /etc/letsencrypt/live/renewal360.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renewal360.in/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root  /home/ubuntu/home/renewal360_website/dist;
    index index.html;

    # ── Fix 1: Remove trailing slashes (301) ─────────────────
    # Prevents duplicate URL indexing in Google Search Console
    rewrite ^/(.+)/$ /$1 permanent;

    # ── Fix 2: SPA fallback ───────────────────────────────────
    # Fixes "Redirect error" in GSC — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Fix 3: Block API routes from being crawled ────────────
    location /api/ {
        return 404;
    }

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Cache static assets (1 year) ─────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache HTML (short TTL) ────────────────────────────────
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/renewal360.access.log;
    error_log  /var/log/nginx/renewal360.error.log;
}